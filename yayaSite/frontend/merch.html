<!DOCTYPE html>

<body>

  <div class="cursor" id="cursor"></div>

        <p class="merch-confirm" id="merchConfirm" style="display:none">
          ✓ Tu seras notifié·e au lancement !
        </p>

    </div>

    <div class="footer-content">
